version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=ajay
      - DB_PASSWORD=66132480
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["sh", "-c", "java -jar app.jar db migrate config.yml && java -jar app.jar server config.yml"]

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: sample-app-2
      POSTGRES_USER: ajay
      POSTGRES_PASSWORD: 66132480
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajay -d sample-app-2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
